# AntVillageMgr - Cloudflare Workers + D1
name = "antvillagemgr"
main = "src/index.ts"
compatibility_date = "2026-03-05"
workers_dev = true  # 保留 antvillagemgr.antsyduan.workers.dev

# 自訂網域：core.antsyduan.com（需確保 antsyduan.com 已在 Cloudflare）
[[routes]]
pattern = "core.antsyduan.com/*"
zone_name = "antsyduan.com"

# D1 Database binding（dev 時使用遠端 D1，與 production 一致）
[[d1_databases]]
binding = "DB"
database_name = "antvillagemgr"
database_id = "ebb9752a-06cf-4dcb-8692-43cdbebbc6f5"
remote = true

# Environment variables (secrets via wrangler secret put)
# MASTER_KEY, JWT_SECRET, etc. - never hardcode in code
# JWT_SECRET: 登入 session 簽章，建議 32+ 字元隨機字串
